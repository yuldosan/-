<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fishing Game</title>
  <style>
    body { text-align: center; background-color: #2c3e50; color: white; font-family: sans-serif; }
    canvas { border: 4px solid #fff; cursor: crosshair; box-shadow: 0px 0px 20px rgba(0,255,255,0.3); border-radius: 10px; }
  </style>
</head>
<body>
  <h2>🌊 Fishing Game 🔱</h2>
  <h3 id="scoreBoard">Score: 0 | Lives: ❤️❤️❤️</h3>
  <canvas id="gameCanvas" width="600" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreBoard = document.getElementById("scoreBoard");

    let score = 0;
    let lives = 3;
    let fish = { x: 300, y: 400, vx: 0, vy: 0, active: false };
    let spear = { x: 300, y: 350, vx: 0, vy: 0, active: false, trail: [] };
    
    function spawnFish() {
      if (!fish.active) {
        fish.x = Math.random() * 400 + 100; 
        fish.y = 400; 
        fish.vx = (Math.random() - 0.5) * 6; 
        fish.vy = -(Math.random() * 6 + 10);
        fish.active = true;
      }
    }

    canvas.addEventListener("mousedown", (e) => {
      if (!spear.active && lives > 0) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const dx = mouseX - 300;
        const dy = mouseY - 350;
        const distance = Math.sqrt(dx*dx + dy*dy);
        spear.x = 300; spear.y = 350; 
        spear.vx = (dx / distance) * 20; 
        spear.vy = (dy / distance) * 20;
        spear.active = true;
        spear.trail = [];
      }
    });

    function update() {
      if (lives <= 0) return;
      if (fish.active) {
        fish.vy += 0.3; 
        fish.x += fish.vx;
        fish.y += fish.vy;
        if (fish.y > 450) fish.active = false; 
      } else {
        if (Math.random() < 0.02) spawnFish(); 
      }
      if (spear.active) {
        spear.trail.push({ x: spear.x, y: spear.y });
        if (spear.trail.length > 15) spear.trail.shift(); 
        spear.x += spear.vx;
        spear.y += spear.vy;
        if (spear.x < 0 || spear.x > 600 || spear.y < 0 || spear.y > 400) {
          spear.active = false;
          lives--; 
          updateScore();
        }
      }
      if (fish.active && spear.active) {
        const dist = Math.sqrt(Math.pow(fish.x - spear.x, 2) + Math.pow(fish.y - spear.y, 2));
        if (dist < 35) {
          score++;
          fish.active = false;
          spear.active = false;
          updateScore();
        }
      }
    }

    function draw() {
      const ocean = ctx.createLinearGradient(0, 0, 0, canvas.height);
      ocean.addColorStop(0, "#4facfe"); 
      ocean.addColorStop(1, "#005c97"); 
      ctx.fillStyle = ocean;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#e6d5a1";
      ctx.fillRect(0, 370, canvas.width, 30);
      if (fish.active) { ctx.font = "35px Arial"; ctx.fillText("🐟", fish.x - 17, fish.y); }
      if (spear.active && spear.trail.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.6)"; 
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.moveTo(spear.trail[0].x, spear.trail[0].y);
        for (let i = 1; i < spear.trail.length; i++) ctx.lineTo(spear.trail[i].x, spear.trail[i].y);
        ctx.lineTo(spear.x, spear.y); 
        ctx.stroke();
      }
      if (spear.active) { ctx.font = "30px Arial"; ctx.fillText("🔱", spear.x - 15, spear.y); }
      ctx.font = "45px Arial"; ctx.fillText("🧍‍♀️", 278, 385);
      if (lives <= 0) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 40px Arial";
        ctx.fillText("GAME OVER!", 180, 200);
      }
    }

    function updateScore() {
      let hearts = "";
      for(let i=0; i<lives; i++) hearts += "❤️";
      scoreBoard.innerText = `Score: ${score} | Lives: ${hearts}`;
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    gameLoop();
  </script>
</body>
</html>
